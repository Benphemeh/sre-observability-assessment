apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
    spec:
      containers:
        - name: server
          env:
            - name: OTEL_SERVICE_NAME
              value: frontend
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=production,service.version=1.0.0
