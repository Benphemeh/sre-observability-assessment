apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "true"
    spec:
      containers:
        - name: server
          env:
            - name: OTEL_SERVICE_NAME
              value: paymentservice
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=production,service.version=1.0.0