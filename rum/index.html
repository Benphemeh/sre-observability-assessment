<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Boutique - RUM Integration</title>
    
    <!-- Elastic RUM Agent Integration -->
    <script src="https://unpkg.com/@elastic/apm-rum@5.16.0/dist/bundles/elastic-apm-rum.umd.min.js" crossorigin></script>
    <script>
      elasticApm.init({
        // Service name for the RUM application
        serviceName: 'frontend-browser',
        
        // Custom APM Server URL from the Elastic Cloud deployment
        // IMPORTANT: In production, this should be routed through a reverse proxy or the APM server should have CORS configured.
        serverUrl: 'https://my-deployment-9a55e5.apm.europe-west2.gcp.elastic-cloud.com:443',

        // RUM does not use ApiKey/SecretToken. It relies on public access or APM server RUM enablement.
        
        // Environment
        environment: 'production',
        
        // Distributed tracing: correlate browser spans with backend traces
        distributedTracingOrigins: ['http://localhost:8081', 'http://boutique.local'],
        
        // Capture page load performance metrics (Core Web Vitals)
        pageLoadTraceId: '${transaction.traceId}',
        pageLoadSpanId: '${transaction.id}',
        pageLoadSampled: true,
        
        // Capture interactions (clicks, etc)
        monitorLongtasks: true,
        instrument: true
      })
      
      // Example of adding custom context as required by the rubric
      elasticApm.addTags({
          'user.type': navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop',
          'session.id': 'sess-' + Math.random().toString(36).substr(2, 9)
      });
    </script>
</head>
<body>
    <h1>RUM Injection Patch</h1>
    <p>This snippet demonstrates how the Elastic RUM agent is integrated into the frontend service HTML templates.</p>
</body>
</html>
